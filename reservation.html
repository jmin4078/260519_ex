<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="미야비(雅) - 실시간 예약">
  <meta property="og:description" content="미야비는 가장 신선한 재료를 준비하기 위해 100% 사전 예약제로 운영됩니다. 지금 실시간으로 예약하세요.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200&auto=format&fit=crop">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>미야비(雅) - 실시간 예약</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif KR', serif; }
    /* 토스트 알림 애니메이션 */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast { animation: slideUp 0.3s ease forwards; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased">
  
  <!-- 토스트 컨테이너 -->
  <div id="toast-container" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none w-max"></div>

  <!-- 헤더 (간소화됨) -->
  <header class="w-full bg-white border-b border-stone-200">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <a href="07_2.html" class="text-stone-500 hover:text-stone-800 transition-colors flex items-center gap-2 text-sm font-medium tracking-wide">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          뒤로가기
        </a>
        <a href="07_2.html" class="text-2xl font-bold tracking-widest text-stone-900 absolute left-1/2 transform -translate-x-1/2">
          미야비 <span class="text-red-700 text-lg ml-1">雅</span>
        </a>
      </div>
    </div>
  </header>

  <!-- 예약 폼 영역 -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20">
    <div class="bg-white p-8 md:p-12 shadow-sm border border-stone-200 rounded-sm">
      <div class="text-center mb-10">
        <span class="text-red-700 font-semibold tracking-widest text-xs block mb-3">RESERVATION</span>
        <h1 class="text-2xl md:text-3xl font-bold text-stone-900 mb-2">실시간 예약</h1>
        <p class="text-stone-500 text-sm font-light">가장 신선한 재료를 준비하기 위해 100% 사전 예약제로 운영됩니다.</p>
      </div>

      <form id="reservation-form" onsubmit="handleReservation(event)" class="space-y-8">
        
        <!-- 날짜 및 인원 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">예약일자 *</label>
            <input type="date" required class="w-full border border-stone-300 px-4 py-2.5 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50">
          </div>
          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">예약인원 *</label>
            <select required class="w-full border border-stone-300 px-4 py-3 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50">
              <option value="" disabled selected>인원을 선택해주세요</option>
              <option value="1">1명</option>
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4">4명</option>
              <option value="5">5명 이상 (전화문의)</option>
            </select>
          </div>
        </div>

        <!-- 시간 및 좌석 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">시간 *</label>
            <select required class="w-full border border-stone-300 px-4 py-3 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50">
              <option value="" disabled selected>시간을 선택해주세요</option>
              <optgroup label="런치">
                <option value="12:00">12:00</option>
                <option value="13:30">13:30</option>
              </optgroup>
              <optgroup label="디너">
                <option value="18:00">18:00</option>
                <option value="19:30">19:30</option>
              </optgroup>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">좌석 선호도</label>
            <select class="w-full border border-stone-300 px-4 py-3 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50">
              <option value="any">상관없음</option>
              <option value="bar">다찌 (카운터 석)</option>
              <option value="room">프라이빗 룸</option>
            </select>
          </div>
        </div>

        <!-- 예약자 정보 -->
        <div class="border-t border-stone-100 pt-8 space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold text-stone-800 mb-2">예약자 성함 *</label>
              <input type="text" id="name" required placeholder="홍길동" class="w-full border border-stone-300 px-4 py-2.5 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50">
            </div>
            <div>
              <label class="block text-sm font-semibold text-stone-800 mb-2">연락처 *</label>
              <input type="tel" id="phone" required placeholder="010-1234-5678" class="w-full border border-stone-300 px-4 py-2.5 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50">
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">알레르기 및 요청사항</label>
            <textarea rows="3" placeholder="특정 식재료 알레르기가 있으시거나 기념일(생일 등)인 경우 남겨주세요." class="w-full border border-stone-300 px-4 py-3 focus:outline-none focus:border-stone-800 text-stone-700 rounded-sm bg-stone-50 resize-none"></textarea>
          </div>
        </div>

        <div class="pt-6">
          <button type="submit" class="w-full bg-stone-900 hover:bg-stone-800 text-white py-4 font-bold tracking-widest transition-colors rounded-sm text-lg shadow-md">
            예약 확정하기
          </button>
          <p class="text-xs text-stone-400 text-center mt-4">예약 확정 시 기재해주신 연락처로 안내 알림톡이 발송됩니다.</p>
        </div>
      </form>
    </div>
  </main>

  <!-- 푸터 -->
  <footer class="bg-stone-900 py-8 text-center text-stone-400 text-xs font-light">
    <p>© 2026 OHIRU DINING. All Rights Reserved.</p>
  </footer>

  <script>
    // 토스트 띄우기 함수 (성공/실패 분기 처리)
    function showToast(message, isSuccess = true) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const bgColor = isSuccess ? 'bg-stone-800' : 'bg-red-700';
      toast.className = `toast flex items-center text-white px-6 py-4 shadow-2xl text-sm font-medium tracking-wide pointer-events-auto border border-stone-700 rounded-sm ${bgColor}`;
      
      const icon = isSuccess 
        ? '<svg class="w-5 h-5 mr-3 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
        : '<svg class="w-5 h-5 mr-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';

      toast.innerHTML = `${icon}<span>${message}</span>`;
      
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // 폼 제출 핸들러 (유효성 검사 및 예약 완료 시뮬레이션)
    function handleReservation(e) {
      e.preventDefault();
      
      const nameInput = document.getElementById('name').value.trim();
      const phoneInput = document.getElementById('phone').value.trim();
      
      // 전화번호에서 숫자만 추출
      const phoneNumbersOnly = phoneInput.replace(/[^0-9]/g, '');

      // 이름 유효성 검사 (4자 이하)
      if (nameInput.length > 4 || nameInput.length === 0) {
        showToast('올바른 성함을 입력해주세요. (4자 이하)', false);
        return;
      }
      
      // 전화번호 유효성 검사 (010 포함 총 11자리)
      if (!phoneNumbersOnly.startsWith('010') || phoneNumbersOnly.length !== 11) {
        showToast('올바른 전화번호를 입력해주세요. (010 포함 11자리)', false);
        return;
      }
      
      // 예약 성공 시뮬레이션
      showToast('예약이 성공적으로 접수되었습니다. 잠시 후 안내 문자가 발송됩니다.', true);
      
      // 2초 뒤 폼 초기화
      setTimeout(() => {
        e.target.reset();
      }, 2000);
    }
  </script>
</body>
</html>
